<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 2</title>
    <link rel="stylesheet" href="../CSS/firstStyle.css" />
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
      // Comandos bloqueantes
      var firstNumber = Number(window.prompt("Digite um número: "));
      var secondNumber = Number(window.prompt("Digite outro número: "));

      var sum = firstNumber + secondNumber;
      window.alert("A soma dos números é: " + sum);

      /*
        Funções de conversão de tipo em JavaScript:
        Number()
        Number.parseInt()
        Number.parseFloat()

        String()
        var.toString()

        Formatação de string:
        */
      var s = "JavaScript";
      window.alert("Eu estou aprendendo s"); // Não faz interpolação
      window.alert("Eu estou aprendendo " + s); // Faz concatenação
      window.alert(`Eu estou aprendendo ${s}`); // Faz interpolação / Usa template string
    </script>
  </body>
</html>
